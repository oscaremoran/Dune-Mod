# Planet
planet.dune-arrakis.name = Arrakis
planet.dune-arrakis.description = A scorched desert world. Home of the spice.

# Items
item.dune-spice.name = Spice
item.dune-spice.description = The mysterious orange substance that powers everything on Arrakis.

# Blocks
block.dune-core-sietch.name = Core: Sietch
block.dune-core-sietch.description = The initial landing core on Arrakis. A fortified desert stronghold.
block.dune-ore-spice.name = Spice Ore
block.dune-barracks.name = Barracks
block.dune-barracks.description = Instantly trains Fremen Warriors (100 spice) or Sardaukar (250 spice) when fed with spice.
block.dune-ornithopter-pad.name = Ornithopter Pad
block.dune-ornithopter-pad.description = Constructs Ornithopters on demand. 400 spice per unit.

# Units
unit.dune-fremen-scout.name = Fremen Scout
unit.dune-fremen-scout.description = A small flying scout spawned from Core: Sietch. The basic worker and defender of Arrakis.
unit.dune-ornithopter.name = Ornithopter
unit.dune-ornithopter.description = An atmospheric attack flyer with beating twin wings. Fast and versatile.
unit.dune-fremen-warrior.name = Fremen Warrior
unit.dune-fremen-warrior.description = A hardened desert warrior. Tough and fast on foot.
unit.dune-sardaukar.name = Sardaukar
unit.dune-sardaukar.description = Elite imperial shock troops. Heavily armored with piercing weapons.

block.dune-lasgun-turret.name = Lasgun Turret
block.dune-lasgun-turret.description = A focused laser turret powered by the grid. Burns through armor at range.
block.dune-spice-exporter.name = Spice Exporter
block.dune-spice-exporter.description = Mines spice and teleports it directly to your core. No conveyors required.
block.dune-spice-generator.name = Spice Generator
block.dune-spice-generator.description = Incinerates spice at high throughput to generate massive amounts of power.
block.dune-spice-node.name = Spice Node
block.dune-spice-node.description = Links nearby structures into a shared power network.
